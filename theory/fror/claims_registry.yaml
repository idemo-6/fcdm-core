    title: "Tri-class representation threshold"
    owner_doc: "fcdm-core/theory/fror/FROR_axioms_v0_2.md"
    status: Core
    statement: "Для трихотомии D={-,0,+} необходимо K(R)>=3 (в канонической дискретной записи R>=3)."
    scope: "Canonical FROR"
    assumptions:
      - "A1..A5"
