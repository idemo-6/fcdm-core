  - claim_id: FROR-CLM-002
    title: "Effective irreversibility from distinguishability deficit"
    owner_doc: "fcdm-core/theory/fror/FROR_axioms_v0_2.md"
    status: Core
    statement: "При N_t>K(R_t) и платной фиксации точный rollback требует доп. ресурса, монотонного по DeltaI_miss."
