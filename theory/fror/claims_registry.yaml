  - claim_id: FROR-CLM-003
    title: "Fixation time tau and background dissipation D are distinct"
    owner_doc: "fcdm-core/theory/fror/FROR_main.md"
    status: Core
    statement: "tau учитывает c_fix, а D учитывает c_bg; при dir=0 возможен c_bg>0 без роста tau."
    scope: "Canonical FROR"
    assumptions:
      - "D4"
      - "D4b"
      - "D5"
      - "D5b"
    falsification:
      - "Невозможность согласованно определить c_fix и c_bg как независимые компоненты в каноне"
    evidence_refs:
      - "fcdm-core/theory/fror/FROR_axioms_v0_2.md"
      - "fcdm-core/theory/fror/FROR_main.md"
      - "fcdm-core/theory/fror/FROR_normalizations_invariants.md"
